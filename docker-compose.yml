version: '3.8'

services:
  # ------------- PostgreSQL Database -------------
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=schoolmaster
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------- Redis (Cache + Hangfire) -------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------- SchoolMaster API -------------
  api:
    build: .
    ports:
      - "7000:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Port=5432;Database=schoolmaster;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Issuer=https://localhost:7000
      - Jwt__Audience=https://localhost:7000
      - Jwt__Key=greatIstheefaithFullNessOfGod,EarlyTheMorning,yourmerciesIsee,allaroundme,ohLordyouaregood,andIwillliftmyvoice
      - Jwt__ExpirationInMinutes=15
      - Jwt__RefreshTokenExpirationInDays=30

volumes:
  pgdata:
